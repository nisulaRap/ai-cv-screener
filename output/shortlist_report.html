<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CV Screening Report — Senior Python Developer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      padding: 40px 20px;
    }
    .container { max-width: 860px; margin: auto; }
    h1 { font-size: 26px; color: #0f3460; border-bottom: 3px solid #0f3460; padding-bottom: 12px; margin-bottom: 8px; }
    .meta { color: #666; font-size: 14px; margin-bottom: 28px; }
    .summary {
      display: flex; gap: 24px;
      background: #fff; border-radius: 10px;
      padding: 20px 28px; margin-bottom: 32px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .summary-item { text-align: center; }
    .summary-item .num { font-size: 36px; font-weight: 700; }
    .summary-item .label { font-size: 13px; color: #777; margin-top: 2px; }
    .num-total  { color: #0f3460; }
    .num-short  { color: #27ae60; }
    .num-reject { color: #e74c3c; }
    .card {
      background: #fff; border-radius: 10px;
      padding: 22px 26px; margin-bottom: 16px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      border-left: 5px solid #ccc;
      position: relative;
    }
    .card.shortlisted { border-left-color: #27ae60; }
    .card.rejected    { border-left-color: #e74c3c; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .candidate-name { font-size: 18px; font-weight: 600; }
    .score-badge {
      font-size: 22px; font-weight: 700;
      min-width: 70px; text-align: right;
      color: #0f3460;
    }
    .rank-label { font-size: 12px; color: #999; margin-top: 2px; }
    .status-pill {
      display: inline-block; padding: 3px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 600;
      margin-top: 6px;
    }
    .pill-shortlisted { background: #e8f8f0; color: #1e8449; }
    .pill-rejected    { background: #fdecea; color: #c0392b; }
    .email { font-size: 13px; color: #888; margin-top: 4px; }
    .reasoning { font-size: 14px; color: #555; margin-top: 12px; font-style: italic; border-top: 1px solid #f0f0f0; padding-top: 10px; }
    .grammar-note { font-size: 12px; color: #aaa; margin-top: 8px; text-align: right; }
    .footer { text-align: center; font-size: 13px; color: #bbb; margin-top: 40px; }
  </style>
</head>
<body>
<div class="container">
  <h1>📋 CV Screening Report</h1>
  <div class="meta">
    <strong>Job Title:</strong> Senior Python Developer &nbsp;|&nbsp;
    <strong>Generated:</strong> 2026-05-02 20:21 &nbsp;|&nbsp;
    <strong>Grammar issues corrected:</strong> 0
  </div>

  <div class="summary">
    <div class="summary-item"><div class="num num-total">0</div><div class="label">Total Candidates</div></div>
    <div class="summary-item"><div class="num num-short">0</div><div class="label">Shortlisted</div></div>
    <div class="summary-item"><div class="num num-reject">0</div><div class="label">Rejected</div></div>
  </div>

  

  <div class="footer">Generated by CV Screener MAS · Agent 4: Report Generator</div>
</div>
</body>
</html>
